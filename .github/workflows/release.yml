name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.2.3)'
        required: true
        type: string

jobs:
  wait-for-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [ x86_64, aarch64 ]
    steps:
      - name: Wait for build (${{ matrix.arch }}) to finish on main
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: main
          check-name: build (${{ matrix.arch }})
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15
          allowed-conclusions: success

  release:
    needs: wait-for-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download x86_64 artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build.yml
          branch: main
          name: buildcharge-x86_64
          path: dist/x86_64

      - name: Download aarch64 artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build.yml
          branch: main
          name: buildcharge-aarch64
          path: dist/aarch64

      - name: Package artifacts
        run: |
          cd dist
          zip -r buildcharge-x86_64.zip x86_64/
          zip -r buildcharge-aarch64.zip aarch64/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/buildcharge-x86_64.zip
            dist/buildcharge-aarch64.zip